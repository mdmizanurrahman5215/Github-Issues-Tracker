<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Github Issues Tracker</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <!-- tailwind + daisy ui linked  -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body class="bg-gray-200 ">
    <!-- login page  -->

    <section
      id="form-container"
      class="flex justify-center items-center min-h-screen bg-gray-200 hidden"
    >
      <form
        id="loginForm"
        action=""
        class="w-11/12 max-w-md bg-white shadow-md rounded-md px-6 py-10 space-y-6"
      >
        <header
          id="logo-details"
          class="flex justify-between items-center flex-col space-y-2"
        >
          <img src="assets/github-logo.png" alt="" />
          <h1 class="text-3xl font-bold">Github Issues Tracker</h1>
          <p>Sign in to manage your issues</p>
        </header>
        <div id="input-field">
          <div class="flex flex-col gap-2">
            <label for="name" class="text-xl font-semibold">Username</label>
            <input
              type="text"
              name="name"
              id="name"
              placeholder="Enter Username"
              value="admin"
              required
              class="px-4 py-2 outline-none border-2 border-gray-300 rounded-md"
            />
            <p class="text-purple-700 font-bold">Default : admin</p>
          </div>
          <div class="flex flex-col gap-2">
            <label for="password" class="text-xl font-semibold">Password</label>
            <input
              type="password"
              name="password"
              id="password"
              placeholder="Enter password"
              value="admin123"
              required
              class="px-4 py-2 outline-none border-2 border-gray-300 rounded-md"
            />
            <p class="text-purple-700 font-bold">Default : admin123</p>
          </div>
        </div>
        <button
          type="submit"
          class="bg-[#4A00FF] w-full py-2 text-white text-2xl font-semibold rounded-md cursor-pointer"
        >
          Sign in
        </button>
        <div class="flex items-center my-6">
          <hr class="flex-grow border-gray-300" />
          <span class="px-2 text-gray-500 text-sm">OR</span>
          <hr class="flex-grow border-gray-300" />
        </div>
        <div id="credentials" class="text-center">
          <p>Demo:Credentials</p>
          <p class="font-medium">Username : <span>admin</span></p>
          <p class="font-medium">Password : <span>admin123</span></p>
        </div>
      </form>
    </section>

    <!-- main page / home page  -->
    <main id="homepage" class="">
      <nav class="navbar bg-white shadow-sm">
        <div class="container mx-auto flex justify-between items-center">
          <div class="flex items-center justify-center gap-2">
            <img src="assets/github-logo.png" alt="" width="50" />
            <h1 class="text-2xl font-semibold hidden sm:block">
              Github Issues Tracker
            </h1>
          </div>
          <div class="flex gap-2">
            <input
              type="text"
              placeholder="🔍 Search"
              class="input border outline-none focus:outline-none w-34 md:w-auto"
            />

            <button class="btn btn-primary">+ New Issues</button>
          </div>
        </div>
      </nav>
      <!-- tabs  -->
      <div
        id="tab-container"
        class="container mx-auto bg-white shadow-md rounded-md mt-10 px-6 py-6"
      >
        <button
          class="btn btn-primary border border-gray-300 rounded-md px-8 py-1 mr-2 shadow-md cursor-pointer"
        >
          All
        </button>
        <button
          class="border border-gray-300 rounded-md px-8 py-1 mr-2 shadow-md cursor-pointer"
        >
          Open
        </button>
        <button
          class="border border-gray-300 rounded-md px-8 py-1 mr-2 shadow-md cursor-pointer"
        >
          Closed
        </button>
      </div>
      <!-- issue container  -->

      <section id="issue-container" class="container mx-auto">
        <div id="issues-load" class="">
          <div
            class="flex justify-between items-center bg-white mt-6 px-6 py-4 rounded-md shadow-md"
          >
            <div class="flex items-center gap-2">
              <div
                class="w-18 h-18 bg-purple-100 rounded-full flex justify-center items-center p-[10px]"
              >
                <img src="./assets/Aperture.png" alt="" class="w-full" />
              </div>
              <div>
                <h1 id="issue-count" class="text-3xl font-semibold"> Issues</h1>
                <h1 class="text-2xl">Track and manage your project issues</h1>
              </div>
            </div>
            <div class="flex justify-center items-center gap-4">
              <div class="flex items-center justify-center gap-2">
                <div class="w-3 h-3 rounded-full bg-green-500"></div>
                <p>Open</p>
              </div>
              <div class="flex items-center justify-center gap-2">
                <div class="w-3 h-3 rounded-full bg-purple-500"></div>
                <p>Close</p>
              </div>
            </div>
          </div>
          <!-- issues  -->
          <div
            id="issues-list"
            class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4 mt-6"
          >
            
          </div>
        </div>
        <!-- loading  -->
        <section
          id="loading"
          class="h-150 flex justify-center items-center hidden"
        >
          <span class="loading loading-spinner loading-xl"></span>
        </section>
      </section>
    </main>

    <script src="./script/index.js"></script>
    <script src="./script/signin.js"></script>
    <script src="./script/loading.js"></script>
    <script src="./script/fetchData.js"></script>
    <script src="./script/displayIssues.js"></script>
    <script src="./script/counter.js"></script>
    <script src="./script/renderBytab.js"></script>

  </body>
</html>
